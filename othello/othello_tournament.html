<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>オセロAI大会 - Tournament System (改良版)</title>
  <style>
    /* （スタイルは元ファイルとほぼ同様。読みやすさのため省略せず載せています） */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      height: 100vh;
    }

    .header {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px 30px;
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 215, 0, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 600;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      background: linear-gradient(90deg, #ffd700, #ffed4e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .phase-indicator {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 1.1rem;
    }

    .phase-badge {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      padding: 8px 20px;
      border-radius: 25px;
      font-weight: bold;
    }

    .main-container {
      display: flex;
      height: calc(100vh - 70px);
      padding: 10px;
      gap: 15px;
    }

    .left-panel {
      width: 40%;
      /* 少し広めにしてもOK */
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      /* 縦スクロール可能に */
    }

    .center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 0;
      /* 追加 */
    }


    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ffd700;
    }

    .player-list {
      max-height: 240px;
      overflow: auto;
    }

    .player-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      margin-bottom: 6px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
    }

    .add-player-form {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .add-player-form input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      color: white;
    }

    .btn-primary {
      background: linear-gradient(45deg, #4CAF50, #45a049);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-secondary {
      display: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-danger {
      background: linear-gradient(45deg, #ff6b6b, #ee5a24);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    #turnIndicator {
      display: none;
    }

    .board-wrapper {
      background: rgba(0, 0, 0, 0.28);
      border-radius: 12px;
      padding: 20px;
    }

    .board-table {
      border-collapse: separate;
      border-spacing: 3px;
      background: #0a5c2b;
      border-radius: 10px;
      padding: 8px;
    }

    .board-cell {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #0f7236, #0f6b33);
      border-radius: 6px;
      position: relative;
    }

    .disc {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .disc.black {
      background: radial-gradient(circle at 30% 30%, #666, #000);
      border: 2px solid #222;
    }

    .disc.white {
      background: radial-gradient(circle at 30% 30%, #fff, #ddd);
      border: 2px solid #bbb;
    }

    .status-display {
      text-align: center;
      padding: 10px;
    }

    .score-display {
      display: flex;
      gap: 30px;
      font-size: 1.6rem;
      font-weight: bold;
      justify-content: center;
    }

    #blackPlayerNameDisplay {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ccc;
      background-color: #000;
      /* 背景色を黒に設定 */
      padding: 5px 10px;
      /* パディングを追加 */
      border-radius: 8px;
      /* 角を丸く設定 */
      transition: color 0.3s;
      /* ターンの強調色変更をスムーズにする */
    }

    #whitePlayerNameDisplay {
      font-size: 1.2rem;
      font-weight: bold;
      color: #444;
      background-color: #FFF;
      /* 背景色を黒に設定 */
      padding: 5px 10px;
      /* パディングを追加 */
      border-radius: 8px;
      /* 角を丸く設定 */
      transition: color 0.3s;
      /* ターンの強調色変更をスムーズにする */
    }

    .results-matrix {
      width: 100%;
      overflow: auto;
    }

    table.results {
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.04);
      width: 100%;
      table-layout: fixed;
      /* ← 幅を効かせるために必須 */
    }

    table.results th,
    table.results td {
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 4px 2px;
      text-align: center;
      font-size: 0.9rem;
    }

    /* thead の th を小さくする */
    table.results thead th {
      width: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    /* tbody の th は大きいまま（必要なら別指定で上書き） */
    table.results tbody th {
      width: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    .log-content {
      max-height: 160px;
      overflow: auto;
      background: rgba(0, 0, 0, 0.15);
      padding: 8px;
      border-radius: 8px;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>🏆 オセロAIアリーナ</h1>
    <div class="phase-indicator">
      <div class="phase-badge" id="currentPhase">準備中</div>
      <div id="matchProgress">試合: 0 / 0</div>
    </div>
  </div>

  <div class="main-container">
    <div class="left-panel">


      <div class="card">
        <div class="card-title">⚙️ 大会コントロール</div>
        <div style="margin-bottom:8px;">
          <input type="range" id="speedSlider" min="1" max="5" step="1" value="1" style="width:100%">
          <!-- <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:rgba(255,255,255,0.7);"></div> -->
        </div>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
          <button class="btn-primary" id="startTournamentBtn" onclick="startTournament()">大会開始</button>
          <button class="btn-primary" id="nextMatchBtn" onclick="playNextMatch()" disabled>次の試合へ</button>
          <button class="btn-secondary" id="startFinalsBtn" onclick="startFinals()" disabled>決勝T開始</button>
          <button class="btn-danger" onclick="resetTournament()">リセット</button>
        </div>

        <div class="card">
          <div class="status-display"
            style="display:flex; justify-content:space-around; align-items:center; padding:0;">
            <div id="blackPlayerNameDisplay" style="font-size:1.2rem; font-weight:bold; color:#ccc;">黒</div>
            <div class="score-display">
              <div><span id="blackScore">2</span></div>
              <div><span id="whiteScore">2</span></div>
            </div>
            <div id="whitePlayerNameDisplay" style="font-size:1.2rem; font-weight:bold; color:#ccc; text-align:right;">白</div>
          </div>
          <div id="turnIndicator" style="text-align:center; margin-top:5px;">ゲーム開始前</div>
        </div>
        <div class="card-title" style="margin-top:6px;">🧾 大会結果表</div>
        <div class="results-matrix" id="resultsMatrixContainer"></div>
      </div>

      <div class="card">
        <div class="card-title">📝 システムログ</div>
        <div class="log-content" id="logContent"></div>
      </div>
      <div class="card">
        <div class="card-title">🏅 順位表（勝ち点: 勝=3 引き分け=1 負=0）</div>
        <div id="leaderboard"></div>
      </div>

      <div class="card">
        <div class="card-title">📊 トーナメント進行</div>
        <div id="tournamentBracket" style="max-height:320px; overflow:auto"></div>
      </div>

      <div class="card">
        <div class="card-title">📋 参加者リスト（最大12名）</div>
        <div class="player-list" id="playerList"></div>
        <div class="add-player-form">
          <input type="text" id="playerNameInput" placeholder="AI名を入力（省略で自動追加）">
          <button class="btn-primary" onclick="addPlayer()">追加</button>
        </div>
        <div style="margin-top:8px; font-size:0.85rem; color:rgba(255,255,255,0.8)">※ 初期は12体が自動追加されます</div>
      </div>

    </div>

    <div class="center-panel">
      <div class="board-wrapper">
        <table class="board-table" id="board"></table>
      </div>

    </div>

    <div class="modal" id="winnerModal"
      style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,0.7)">
      <div
        style="background:#123; padding:24px; border-radius:12px; text-align:center; border:2px solid rgba(255,215,0,0.3)">
        <div id="winnerName" style="font-size:2rem; font-weight:700; color:#ffd700; margin-bottom:8px"></div>
        <div id="finalScore" style="margin-bottom:8px"></div>
        <button class="btn-primary" onclick="document.getElementById('winnerModal').style.display='none'">閉じる</button>
      </div>
    </div>

    <!-- 外部スクリプトを想定して読み込み（board.js, AI群）。ユーザー既存ファイルを使います -->
    <script src="board.js"></script>
    <script src="sampleAI/myAi.js"></script>
    <script src="playerAI/hayashiMasahiro.js"></script>
    <script src="playerAI/hayashiYuki.js"></script>
    <script src="playerAI/katou.js"></script>
    <script src="playerAI/nakagawa.js"></script>
    <script src="playerAI/nakamura.js"></script>
    <script src="playerAI/sakai.js"></script>
    <script src="playerAI/sakashita.js"></script>
    <script src="playerAI/shiraki.js"></script>
    <script src="playerAI/suematu.js"></script>
    <script src="playerAI/suyama.js"></script>

    <script>
      // グローバル
      let board = null;
      let players = [];
      let matches = [];
      let currentMatchIndex = 0;
      let currentMatch = null;
      let tournamentPhase = 'preparation'; // preparation | preliminary | finals | finished
      let gameRunning = false;
      let gamePaused = false;
      let gameSpeed = 1;
      let autoTimer = null;
      let currentColor = 1; // 1=黒, -1=白

      const speedSettings = { 1: { delay: 50 }, 2: { delay: 200 }, 3: { delay: 500 }, 4: { delay: 1000 }, 5: { delay: 2000 } };

      // 初期化
      function init() {
        createBoard();
        document.getElementById('speedSlider').addEventListener('input', (e) => { gameSpeed = parseInt(e.target.value) });
        document.getElementById('playerNameInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addPlayer(); });

        const defaultPlayers = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
        defaultPlayers.forEach(name => addPlayer(name));
        buildResultsMatrix();
      }

      // Board 作成と描画
      function createBoard() {
        const table = document.getElementById('board'); table.innerHTML = '';
        for (let y = 0; y < 8; y++) { const tr = document.createElement('tr'); for (let x = 0; x < 8; x++) { const td = document.createElement('td'); td.className = 'board-cell'; td.dataset.x = x; td.dataset.y = y; tr.appendChild(td); } table.appendChild(tr); }
        board = new Board(); renderBoard();
      }
      function renderBoard() { if (!board) return; for (let y = 0; y < 8; y++) { for (let x = 0; x < 8; x++) { const cell = document.querySelector(`[data-x="${x}"][data-y="${y}"]`); cell.innerHTML = ''; const v = board.board[y][x]; if (v !== 0) { const d = document.createElement('div'); d.className = `disc ${v === 1 ? 'black' : 'white'}`; cell.appendChild(d); } } } updateScore(); }
      function updateScore() { if (!board) return; const c = board.countDiscs(); document.getElementById('blackScore').textContent = c.black; document.getElementById('whiteScore').textContent = c.white; }

      // プレイヤー管理
      function addPlayer(name) {
        if (!name) { name = document.getElementById('playerNameInput').value.trim(); document.getElementById('playerNameInput').value = ''; }
        if (!name) {
          // 自動生成名（重複避ける）
          let base = 'AI'; let i = 1; while (players.find(p => p.name === base + i)) i++; name = base + i;
        }
        if (players.length >= 12) { addLog('参加者は最大12名です', 'error'); return; }
        if (players.find(p => p.name === name)) { addLog('同名のプレイヤーが既に存在します', 'error'); return; }
        // 修正点2: finalDiscTotal を初期化に追加
        const p = { id: Date.now() + Math.random(), name, wins: 0, losses: 0, draws: 0, points: 0, flippedTotal: 0, finalDiscTotal: 0, ai: createAI(name) };
        players.push(p); updatePlayerList(); addLog(`プレイヤー追加: ${name}`, 'success'); buildResultsMatrix();
      }

      function createAI(name) {
        // 既存のAIクラスがグローバルにある想定
        const mapping = { 'A': 'HayashiMasahiroAI', 'B': 'HayashiYukiAI', 'C': 'KatouAI', 'D': 'NakagawaAI', 'E': 'NakamuraAI', 'F': 'SakaiAI', 'G': 'SakashitaAI', 'H': 'ShirakiAI', 'I': 'SuematuAI', 'J': 'SuyamaAI' };
        // ここではランダムで既存AIを割り当て（ユーザーは必要なら自分のAIを登録してください）
        const defaultAis = ['MyAI'];
        const aiName = mapping[name] || defaultAis[Math.floor(Math.random() * defaultAis.length)];

        try {
          if (window[aiName] && typeof window[aiName] === 'function') {
            return new window[aiName]();
          }
        } catch (e) {
          console.error(`AIの生成に失敗しました: ${aiName}`, e);
        }
        return null;
        // フォールバック: ランダムAI
        // return { getMove: (bd, color) => { const moves = bd.getValidMoves(color); return moves[Math.floor(Math.random() * moves.length)]; } };
      }

      // 予選作成：ラウンドロビン（Berger方式）
      function generatePreliminaryMatches() {
        matches = [];
        const n = players.length;
        if (n < 2) return;
        // round-robin: if even number, use circle method
        const ids = players.map(p => p.id);
        // make working array of players
        const arr = players.slice();
        // if odd, add bye (not needed here)
        const rounds = n - 1;
        for (let r = 0; r < rounds; r++) {
          for (let i = 0; i < n / 2; i++) {
            const p1 = arr[i];
            const p2 = arr[n - 1 - i];
            // ensure each pair only once by canonicalizing ids
            matches.push({ player1: p1, player2: p2, round: r + 1, result: null, seriesWins1: 0, seriesWins2: 0 });
          }
          // rotate (keep first fixed)
          const fixed = arr[0];
          const last = arr.pop();
          arr.splice(1, 0, last);
        }
        // matches currently grouped by round; to satisfy "それぞれ1試合ずつ順番に出る" we will interleave by rounds: play round1 matches in order, then round2, etc. That's already the case.
        updateTournamentBracket(); updateMatchProgress();
      }

      // 12x12結果行列（初期化）
      function buildResultsMatrix() {
        const container = document.getElementById('resultsMatrixContainer');
        if (players.length === 0) { container.innerHTML = ''; return; }
        const n = players.length;
        let html = '<div style="overflow:auto">';
        html += '<table class="results"><thead><tr><th></th>' + players.map(p => `<th>${p.name}</th>`).join('') + '</tr></thead><tbody>';
        for (let i = 0; i < n; i++) {
          html += `<tr><th>${players[i].name}</th>`;
          for (let j = 0; j < n; j++) {
            if (i === j) html += '<td style="background:rgba(255,255,255,0.03)">-</td>'; else html += `<td id="cell-${i}-${j}">-</td>`;
          }
          html += '</tr>';
        }
        html += '</tbody></table></div>';
        container.innerHTML = html;
      }

      function updateResultsMatrix(match) {
        // match contains player1/2 and result string like 'X 勝利 (a-b)' or '引き分け (x-y)'
        if (!match) return;
        const p1 = match.player1; const p2 = match.player2;
        const i = players.findIndex(p => p.id === p1.id); const j = players.findIndex(p => p.id === p2.id);
        if (i < 0 || j < 0) return;
        let cellText = '';
        if (match.result.includes('引き分け')) cellText = '△';
        else if (match.result.includes('勝利')) {
          const winnerName = match.result.split(' 勝利')[0];
          if (winnerName === p1.name) cellText = '○'; else cellText = '×';
        } else cellText = '?';
        // set both [i][j] and [j][i]
        document.getElementById(`cell-${i}-${j}`).textContent = cellText;
        // mirror
        let mirror = '?'; if (cellText === '○') mirror = '×'; else if (cellText === '×') mirror = '○'; else if (cellText === '△') mirror = '△';
        document.getElementById(`cell-${j}-${i}`).textContent = mirror;
      }

      // トーナメント開始
      function startTournament() {
        if (players.length < 2) { addLog('参加者が2名以上必要です', 'error'); return; }
        if (players.length !== 12) addLog('参加者が12名でない場合でも動作しますが、本来は12名で66戦になります', 'info');
        tournamentPhase = 'preliminary'; document.getElementById('currentPhase').textContent = '予選中';
        // 修正点3: reset stats に finalDiscTotal を追加
        players.forEach(p => { p.wins = 0; p.losses = 0; p.draws = 0; p.points = 0; p.flippedTotal = 0; p.finalDiscTotal = 0; });
        generatePreliminaryMatches(); currentMatchIndex = 0; document.getElementById('startTournamentBtn').disabled = true; addLog('予選ラウンド開始！', 'info'); playNextMatch();
      }

      // 次の試合
      function playNextMatch() {
        const nextBtn = document.getElementById('nextMatchBtn');
        if (nextBtn) {
          nextBtn.disabled = true;
        }

        updateMatchProgress(); updateTournamentBracket(); updateLeaderboard();
        if (currentMatchIndex >= matches.length) {
          // 予選終了
          if (tournamentPhase === 'preliminary') {
            addLog('予選ラウンド終了！', 'info'); document.getElementById('startFinalsBtn').disabled = false; document.getElementById('currentPhase').textContent = '予選終了'; tournamentPhase = 'prelim_finished';
          } else if (tournamentPhase === 'finals') {
            // finals flow handled elsewhere
          }
          return;
        }
        currentMatch = matches[currentMatchIndex];
        startMatch(currentMatch.player1, currentMatch.player2, onSingleMatchComplete);
      }

      // 1ゲームを開始する（予選も決勝も共通）。完了時にcallback(match)呼ぶ
      function startMatch(p1, p2, callback) {
        board = new Board(); renderBoard();
        // ランダムに先手
        const blackFirst = Math.random() < 0.5;
        currentMatch = currentMatch || {};
        currentMatch.blackPlayer = blackFirst ? p1 : p2;
        currentMatch.whitePlayer = blackFirst ? p2 : p1;
        // リセット match 特有の一試合のフリップカウント
        currentMatch.blackPlayer.currentMatchFlipped = 0;
        currentMatch.whitePlayer.currentMatchFlipped = 0;

        // 【ここを修正・追加】: プレイヤー名を新しい表示エリアに設定
        const blackNameEl = document.getElementById('blackPlayerNameDisplay');
        const whiteNameEl = document.getElementById('whitePlayerNameDisplay');
        if (blackNameEl) {
          blackNameEl.innerHTML = `${currentMatch.blackPlayer.name}`;
        }
        if (whiteNameEl) {
          whiteNameEl.innerHTML = `${currentMatch.whitePlayer.name}`;
        }

        // 元々あったターン表示のテキストは更新しないか、または削除
        // document.getElementById('turnIndicator').textContent = `${currentMatch.blackPlayer.name}（黒） vs ${currentMatch.whitePlayer.name}（白）`;

        // 不要になった既存の要素取得と存在チェック部分を削除またはコメントアウト
        // const p1El = document.getElementById('player1Name');
        // if (p1El) { p1El.textContent = currentMatch.blackPlayer.name; }
        // const p2El = document.getElementById('player2Name');
        // if (p2El) { p2El.textContent = currentMatch.whitePlayer.name; }

        currentColor = 1; gameRunning = true; gamePaused = false; addLog(`試合開始: ${currentMatch.blackPlayer.name}(黒) vs ${currentMatch.whitePlayer.name}(白)`, 'info');

        // 開始後のループ
        gameLoop(callback);
      }

      // ゲームループ（シングルゲーム）: callbackに match 結果を返す
      function gameLoop(callback) {
        if (!gameRunning || gamePaused) return;
        const curPlayer = currentColor === 1 ? currentMatch.blackPlayer : currentMatch.whitePlayer;
        const validMoves = board.getValidMoves(currentColor);
        if (validMoves.length === 0) {
          const other = -currentColor; const otherMoves = board.getValidMoves(other);
          if (otherMoves.length === 0) { endMatch(callback); return; } else { addLog(`${curPlayer.name} パス`, 'info'); currentColor = other; updateTurnIndicator(); autoTimer = setTimeout(() => gameLoop(callback), speedSettings[gameSpeed].delay); return; }
        }
        updateTurnIndicator();
        // AI思考（同期的扱い）
        setTimeout(() => {
          try {
            const before = cloneBoardArray(board.board);
            const start = Date.now();
            let move = curPlayer.ai.getMove(board.clone(), currentColor);
            const elapsed = Date.now() - start;
            if (elapsed > 1000) { addLog(`${curPlayer.name} タイムアウト(${elapsed}ms)`, 'error'); move = validMoves[Math.floor(Math.random() * validMoves.length)]; }
            if (!move || !validMoves.find(m => m.x === move.x && m.y === move.y)) { addLog(`${curPlayer.name} 不正な手 -> ランダムで代替`, 'error'); move = validMoves[Math.floor(Math.random() * validMoves.length)]; }
            board.applyMove(move.x, move.y, currentColor);
            renderBoard();
            const after = board.board;
            const flips = countFlips(before, after, currentColor);
            // 集計
            if (currentColor === 1) currentMatch.blackPlayer.currentMatchFlipped += flips; else currentMatch.whitePlayer.currentMatchFlipped += flips;
            currentColor = -currentColor;
            if (gameRunning) { autoTimer = setTimeout(() => gameLoop(callback), speedSettings[gameSpeed].delay); }
          } catch (err) {
            addLog(`AIエラー: ${err.message}`, 'error'); // ランダム着手
            const move = validMoves[Math.floor(Math.random() * validMoves.length)]; board.applyMove(move.x, move.y, currentColor); renderBoard(); currentColor = -currentColor; if (gameRunning) { autoTimer = setTimeout(() => gameLoop(callback), speedSettings[gameSpeed].delay); }
          }
        }, 0);
      }

      // 終局処理（シングルゲーム）。callbackに currentMatch を渡す
      function endMatch(callback) {
        gameRunning = false; if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
        const cnt = board.countDiscs();
        let resultText = ''; let winner = null; let loser = null;
        if (cnt.black > cnt.white) { winner = currentMatch.blackPlayer; loser = currentMatch.whitePlayer; resultText = `${winner.name} 勝利 (${cnt.black}-${cnt.white})`; }
        else if (cnt.white > cnt.black) { winner = currentMatch.whitePlayer; loser = currentMatch.blackPlayer; resultText = `${winner.name} 勝利 (${cnt.white}-${cnt.black})`; }
        else { resultText = `引き分け (${cnt.black}-${cnt.white})`; }

        // 勝敗ポイントと個人別ひっくり返し数を更新
        if (winner && loser) { winner.wins++; winner.points += 3; loser.losses++; addLog(`試合終了: ${resultText}`, 'success'); }
        else { currentMatch.blackPlayer.draws++; currentMatch.whitePlayer.draws++; currentMatch.blackPlayer.points++; currentMatch.whitePlayer.points++; addLog(`試合終了: 引き分け (${cnt.black}-${cnt.white})`, 'info'); }

        // ひっくり返し合計に追加
        currentMatch.blackPlayer.flippedTotal += currentMatch.blackPlayer.currentMatchFlipped || 0;
        currentMatch.whitePlayer.flippedTotal += currentMatch.whitePlayer.currentMatchFlipped || 0;

        // 試合オブジェクトに記録
        currentMatch.result = resultText;
        currentMatch.score = { black: cnt.black, white: cnt.white };

        // 修正点1: 最終石数の合計を記録
        currentMatch.blackPlayer.finalDiscTotal = (currentMatch.blackPlayer.finalDiscTotal || 0) + cnt.black;
        currentMatch.whitePlayer.finalDiscTotal = (currentMatch.whitePlayer.finalDiscTotal || 0) + cnt.white;

        // 予選の結果行列更新（両方向）
        if (tournamentPhase === 'preliminary' || tournamentPhase === 'prelim_finished') updateResultsMatrix(currentMatch);

        updateLeaderboard(); updateTournamentBracket(); updateMatchProgress();

        // 完了コールバック（決勝の連戦制御などは外で処理）
        if (typeof callback === 'function') callback(currentMatch);

        // 次へ
        currentMatchIndex++;
        // --- 【修正点】自動進行を停止し、ボタンを有効化 ---
        const nextBtn = document.getElementById('nextMatchBtn');
        if (nextBtn) {
          // 予選が全て終了していない、かつ、決勝トーナメント中でない場合のみ有効
          if (tournamentPhase === 'preliminary') {
            nextBtn.disabled = false;
            addLog('試合終了。次の試合へ進むには「次の試合へ」ボタンを押してください', 'info');
            return; // 次の試合の自動呼び出しを停止
          }
        }
        // ----------------------------------------------------

        // 予選終了後や決勝T中の自動呼び出しは引き続き行いますが、
        // 予選中の制御は上のifブロックで行われます。
        // 【注意】決勝トーナメントはシリーズ制御のため、この行は削除せず残しますが、
        // 予選の最後の試合が終わり、決勝T開始待ちの場合は次のmatchがないため、
        // playNextMatch()内で処理されます。

        setTimeout(() => playNextMatch(), 800);
      }

      // 決勝トーナメント開始（上位4名）
      function startFinals() {
        const nextBtn = document.getElementById('nextMatchBtn');
        if (nextBtn) {
          nextBtn.disabled = true;
        }
        // ランキングは勝ち点→ひっくり返し合計で決定
        tournamentPhase = 'finals'; document.getElementById('currentPhase').textContent = '決勝トーナメント'; document.getElementById('startFinalsBtn').disabled = true;
        // ソート
        const sorted = [...players].sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          return b.finalDiscTotal - a.finalDiscTotal; // 新しいソート条件: 勝ち点同点なら最終石数の合計
        });
        const finalists = sorted.slice(0, Math.min(4, sorted.length));
        addLog(`決勝進出: ${finalists.map(p => p.name).join(', ')}`, 'info');
        // 準決勝組み合わせ: 1 vs 4, 2 vs 3
        matches = [];
        matches.push({ player1: finalists[0], player2: finalists[3], round: 'semifinals', seriesWins1: 0, seriesWins2: 0, games: [], result: null });
        matches.push({ player1: finalists[1], player2: finalists[2], round: 'semifinals', seriesWins1: 0, seriesWins2: 0, games: [], result: null });
        currentMatchIndex = 0; playNextFinalMatch();
      }

      // 決勝トーナメントの試合進行（2本先取のシリーズ）
      function playNextFinalMatch() {
        if (currentMatchIndex >= matches.length) {
          // 全てのシリーズ完了なら決勝へ
          const winners = matches.map(m => m.seriesWinner).filter(Boolean);
          if (winners.length === 2) { // 準決勝勝者
            matches = [{ player1: winners[0], player2: winners[1], round: 'finals', seriesWins1: 0, seriesWins2: 0, games: [], result: null }];
            currentMatchIndex = 0; playNextFinalMatch();
          } else if (winners.length === 1 && matches[0].round === 'finals' && matches[0].seriesWinner) {
            // 優勝
            finishTournament(matches[0].seriesWinner);
          }
          return;
        }
        currentMatch = matches[currentMatchIndex];
        // 1ゲームを実行。完了時に series を扱うコールバックを渡す
        startMatch(currentMatch.player1, currentMatch.player2, (singleMatch) => {
          // 勝者を決める
          let blackName = singleMatch.blackPlayer.name;
          let whiteName = singleMatch.whitePlayer.name;
          const sc = singleMatch.score; // {black, white}
          let winnerIsPlayer1 = null; // true if player1 wins
          if (sc.black > sc.white) { winnerIsPlayer1 = (singleMatch.blackPlayer.id === currentMatch.player1.id); }
          else if (sc.white > sc.black) { winnerIsPlayer1 = (singleMatch.whitePlayer.id === currentMatch.player1.id); }
          else winnerIsPlayer1 = null; // draw

          // 記録
          currentMatch.games.push(singleMatch);
          if (winnerIsPlayer1 === true) currentMatch.seriesWins1 = (currentMatch.seriesWins1 || 0) + 1;
          else if (winnerIsPlayer1 === false) currentMatch.seriesWins2 = (currentMatch.seriesWins2 || 0) + 1;
          else { /* draw -> no series increment, but count as 1 point for both? For series we treat draws as no-one getting a game win */ }

          addLog(`シリーズ状況: ${currentMatch.player1.name} ${currentMatch.seriesWins1 || 0} - ${currentMatch.seriesWins2 || 0} ${currentMatch.player2.name}`, 'info');

          // シリーズ終了判定 (先に2勝)
          if ((currentMatch.seriesWins1 || 0) >= 2) { currentMatch.seriesWinner = currentMatch.player1; currentMatch.result = `${currentMatch.player1.name} シリーズ勝ち`; addLog(`${currentMatch.player1.name} がシリーズ勝利！`, 'success'); currentMatchIndex++; setTimeout(() => playNextFinalMatch(), 800); }
          else if ((currentMatch.seriesWins2 || 0) >= 2) { currentMatch.seriesWinner = currentMatch.player2; currentMatch.result = `${currentMatch.player2.name} シリーズ勝ち`; addLog(`${currentMatch.player2.name} がシリーズ勝利！`, 'success'); currentMatchIndex++; setTimeout(() => playNextFinalMatch(), 800); }
          else {
            // 続けて同じ組で別ゲームを挿入（現在の currentMatch をそのまま維持して次のゲームを実施）
            addLog(`同一組の次ゲームへ (${currentMatch.player1.name} vs ${currentMatch.player2.name})`, 'info');
            // そのまま playNextFinalMatch を呼ぶことで同じ currentMatchIndex を使って次ゲームを実行
            setTimeout(() => playNextFinalMatch(), 500);
          }

          updateTournamentBracket(); updateLeaderboard(); updateMatchProgress();
        });
      }

      // トーナメント終了
      function finishTournament(champion) {
        tournamentPhase = 'finished'; document.getElementById('currentPhase').textContent = '大会終了';
        if (champion) { document.getElementById('winnerName').textContent = `🏆 ${champion.name} 優勝！`; document.getElementById('finalScore').textContent = `戦績: 勝 ${champion.wins} / 負 ${champion.losses} / 分 ${champion.draws} / 最終石合計 ${champion.finalDiscTotal}`; document.getElementById('winnerModal').style.display = 'flex'; addLog(`🏆 優勝: ${champion.name}`, 'success'); }
        document.getElementById('startTournamentBtn').disabled = false; document.getElementById('startFinalsBtn').disabled = true;
      }

      // UI 更新群
      function updatePlayerList() {
        const list = document.getElementById('playerList');
        list.innerHTML = players.map(p => {
          const gamesPlayed = p.wins + p.losses + p.draws;
          return `<div class="player-item"><div>${p.name}</div><div style="font-size:0.85rem">試:${gamesPlayed} 点:${p.points} 石:${p.finalDiscTotal || 0}</div></div>`;
        }).join('');
        buildResultsMatrix();
      }

      // 修正点5: updateLeaderboard の表示とソート条件を変更
      function updateLeaderboard() {
        // 勝ち点が高い順、同点の場合は最終石数の合計が多い順
        const sorted = [...players].sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          return b.finalDiscTotal - a.finalDiscTotal;
        });
        const container = document.getElementById('leaderboard');
        container.innerHTML = sorted.map((p, i) => {
          const gamesPlayed = p.wins + p.losses + p.draws;
          return `<div style="display:flex; justify-content:space-between; padding:6px; border-bottom:1px solid rgba(255,255,255,0.03)">
                      <div>${i + 1}. ${p.name}</div>
                      <div>試:${gamesPlayed} 点:${p.points} 石:${p.finalDiscTotal || 0}</div>
                    </div>`;
        }).join('');
      }

      function updateTournamentBracket() {
        const el = document.getElementById('tournamentBracket'); if (matches.length === 0) { el.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.6)">対戦表なし</div>'; return; } let html = ''; const rounds = {};
        matches.forEach((m, idx) => { const round = m.round || '予選'; if (!rounds[round]) rounds[round] = []; rounds[round].push(Object.assign({ idx }, m)); });
        for (const [r, arr] of Object.entries(rounds)) { html += `<div style="font-weight:700; margin:6px 0">${r}</div>`; arr.forEach(m => { html += `<div style="padding:6px; border-radius:6px; background: ${m === currentMatch ? 'rgba(255,215,0,0.08)' : 'transparent'}; margin-bottom:6px">${m.player1.name} vs ${m.player2.name} <span style="float:right">${m.result || '未実施'}</span></div>`; }); }
        el.innerHTML = html;
      }

      function updateMatchProgress() { const total = matches.length; const completed = matches.filter(m => m.result).length; document.getElementById('matchProgress').textContent = `試合: ${completed} / ${total}`; }

      function updateTurnIndicator() {
        const curPlayer = currentColor === 1 ? currentMatch?.blackPlayer : currentMatch?.whitePlayer;
        const indicatorEl = document.getElementById('turnIndicator');
        const blackNameEl = document.getElementById('blackPlayerNameDisplay');
        const whiteNameEl = document.getElementById('whitePlayerNameDisplay');

        if (indicatorEl) {
          indicatorEl.textContent = curPlayer ? `${curPlayer.name} の番です` : 'ゲーム開始前';
        }

        // 現在のターンのプレイヤー名を強調表示
        if (blackNameEl) {
          blackNameEl.style.color = (currentColor === 1) ? '#ffd700' : '#ccc';
        }
        if (whiteNameEl) {
          whiteNameEl.style.color = (currentColor === -1) ? '#ffd700' : '#ccc';
        }
      }

      // ログ
      function addLog(msg, type = 'info') { const log = document.getElementById('logContent'); const e = document.createElement('div'); e.textContent = `[${new Date().toLocaleTimeString('ja-JP')}] ${msg}`; log.insertBefore(e, log.firstChild); while (log.children.length > 200) log.removeChild(log.lastChild); }

      // ユーティリティ: board 配列クローン
      function cloneBoardArray(arr) { return arr.map(row => row.slice()); }
      function countFlips(before, after, playerColor) { // before/after are 8x8 arrays
        let flips = 0; for (let y = 0; y < 8; y++) for (let x = 0; x < 8; x++) { if (before[y][x] === -playerColor && after[y][x] === playerColor) flips++; }
        return flips;
      }

      // リセット
      function resetTournament() { if (!confirm('本当にリセットしますか？')) return; if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; } players = []; matches = []; currentMatchIndex = 0; currentMatch = null; tournamentPhase = 'preparation'; document.getElementById('currentPhase').textContent = '準備中'; document.getElementById('startFinalsBtn').disabled = true; document.getElementById('startTournamentBtn').disabled = false; createBoard(); updatePlayerList(); updateTournamentBracket(); addLog('大会をリセットしました', 'info'); }

      // 決勝用の進行呼び出し
      // playNextMatch から呼ばれる onSingleMatchComplete: 予選では通常通り、決勝では別フロー
      function onSingleMatchComplete(singleMatch) {
        // 予選時: currentMatch は matches[currentMatchIndex]
        if (tournamentPhase === 'preliminary' || tournamentPhase === 'prelim_finished') {
          // 予選の通常の流れは既に endMatch 内で処理される
        }
        // 決勝は playNextFinalMatch のコールバックで処理
      }

      // 初期化
      window.addEventListener('load', init);
    </script>
</body>
